# ─────────────────────────────────────────────────────────────────────────────
# Carbon Nexus — CI/CD Pipeline
# GitHub Actions → Google Cloud (Workload Identity Federation, no static keys)
#
# Triggers:
#   push to main    → full deploy (backend + frontend)
#   push to staging → staging env deploy
#   pull_request    → lint + test only
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy Carbon Nexus

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

env:
  PROJECT_ID:    carbon-nexus-prod
  REGION:        asia-south1
  REGISTRY:      asia-south1-docker.pkg.dev
  IMAGE_NAME:    asia-south1-docker.pkg.dev/carbon-nexus-prod/carbon-nexus/api
  SERVICE_NAME:  carbon-nexus-api

jobs:
  # ─── 1. Lint & Test ────────────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-asyncio ruff

      - name: Lint (ruff)
        run: ruff check backend/

      - name: Run tests
        run: |
          cd backend
          pytest tests/ -v --tb=short
        env:
          GOOGLE_CLOUD_PROJECT: carbon-nexus-prod
          PYTHONPATH: .

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend lint
        run: |
          cd frontend
          npm ci
          npm run lint


  # ─── 2. Build & Push Docker Image ──────────────────────────────────────────
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging'

    permissions:
      contents: read
      id-token: write   # Required for Workload Identity Federation

    steps:
      - uses: actions/checkout@v4

      # Authenticate to GCP using Workload Identity (no static service account keys)
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account:           ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build Docker image
        run: |
          cd backend
          docker build \
            --tag ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --tag ${{ env.IMAGE_NAME }}:latest \
            --cache-from ${{ env.IMAGE_NAME }}:latest \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            .

      - name: Push to Artifact Registry
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.IMAGE_NAME }}:latest


  # ─── 3. Deploy Backend to Cloud Run ────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend (Cloud Run)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account:           ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service:  ${{ env.SERVICE_NAME }}
          region:   ${{ env.REGION }}
          image:    ${{ env.IMAGE_NAME }}:${{ github.sha }}
          flags: |
            --allow-unauthenticated
            --min-instances=0
            --max-instances=5
            --memory=2Gi
            --cpu=2
            --concurrency=80
            --timeout=300

      - name: Verify deployment
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --format='value(status.url)')
          echo "Deployed to: $URL"
          curl --fail "$URL/health" || exit 1


  # ─── 4. Deploy Cloud Function (Pub/Sub processor) ──────────────────────────
  deploy-functions:
    name: Deploy Cloud Functions
    runs-on: ubuntu-latest
    needs: deploy-backend
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account:           ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Package Cloud Function
        run: |
          cd backend/pubsub
          zip -r event_processor.zip event_processor.py ../../requirements.txt

      - name: Upload to GCS
        run: |
          gsutil cp backend/pubsub/event_processor.zip \
            gs://carbon-nexus-prod-functions-source/event_processor.zip

      - name: Deploy Cloud Function
        run: |
          gcloud functions deploy carbon-event-processor \
            --gen2 \
            --runtime=python311 \
            --region=${{ env.REGION }} \
            --source=gs://carbon-nexus-prod-functions-source/event_processor.zip \
            --entry-point=process_carbon_event \
            --trigger-topic=carbon-events \
            --memory=512MB \
            --timeout=60s \
            --service-account=${{ secrets.CLOUD_RUN_SA_EMAIL }}


  # ─── 5. Deploy Frontend to Firebase Hosting ────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend (Firebase Hosting)
    runs-on: ubuntu-latest
    needs: deploy-backend
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account:           ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Get Cloud Run URL
        id: cloud-run-url
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --format='value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Build React app
        run: |
          cd frontend
          npm ci
          npm run build
        env:
          VITE_CLOUD_RUN_URL:                    ${{ steps.cloud-run-url.outputs.url }}
          VITE_FIREBASE_API_KEY:                 ${{ secrets.FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN:             ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID:              ${{ env.PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET:          ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID:     ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID:                  ${{ secrets.FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID:          ${{ secrets.FIREBASE_MEASUREMENT_ID }}

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken:       ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId:       live
          projectId:       ${{ env.PROJECT_ID }}

      - name: Post deployment summary
        run: |
          echo "## ✅ Carbon Nexus Deployed" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Cloud Run API | ✅ ${{ steps.cloud-run-url.outputs.url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Firebase Hosting | ✅ https://carbon-nexus-prod.web.app |" >> $GITHUB_STEP_SUMMARY
          echo "| Cloud Functions | ✅ carbon-event-processor |" >> $GITHUB_STEP_SUMMARY
          echo "| Gemini 2.0 Flash | ✅ asia-south1 |" >> $GITHUB_STEP_SUMMARY
          echo "| Vertex AI RAG | ✅ carbon-knowledge-base |" >> $GITHUB_STEP_SUMMARY